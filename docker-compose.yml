services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cyp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cyp
      POSTGRES_PASSWORD: cyp
      POSTGRES_DB: cyp
    ports:
      - "5433:5432"
    volumes:
      - cyp-pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyp -d cyp"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: .
    image: cyp-agent:local
    container_name: cyp-agent
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      CYP_MODE: paper
      CYP_EXECUTION_VENUE: paper
      CYP_DATA_SOURCE: synthetic
      CYP_PERSISTENCE: postgres
      CYP_DB_URL: postgresql://cyp:cyp@db:5432/cyp
      CYP_OHLCV_ARCHIVE_ENABLED: "true"
      CYP_OHLCV_RETENTION_DAYS: "730"
      CYP_APPROVAL: dashboard
      CYP_RUNTIME_AUTOSTART: "false"
      CYP_API_TOKEN: "${CYP_API_TOKEN:-}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_API_SECRET: ${OKX_API_SECRET:-}
      OKX_PASSWORD: ${OKX_PASSWORD:-}
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  cyp-pgdata:
