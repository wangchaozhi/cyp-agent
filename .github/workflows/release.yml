name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        env:
          WORKFLOW_INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${WORKFLOW_INPUT_TAG}"
          fi
          tag="${tag#refs/tags/}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.2.0, got ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Validate versions
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          test "$(tr -d '\r\n' < VERSION)" = "${VERSION}"
          node -e 'const p=require("./apps/web/package.json"); if(p.version!==process.env.VERSION) process.exit(1)'
      - name: Test with race detector
        run: go test -race -count=1 ./...
      - name: Build Go archives
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets stage
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
            goos="${target%-*}"
            goarch="${target#*-}"
            dir="stage/cyp-agent-${VERSION}-${target}"
            mkdir -p "${dir}"
            suffix=""
            if [[ "${goos}" == "windows" ]]; then suffix=".exe"; fi
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${dir}/cyp-server${suffix}" ./cmd/cyp-server
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${dir}/cyp${suffix}" ./cmd/cyp
            cp README.md LICENSE* "${dir}/" 2>/dev/null || cp README.md "${dir}/"
            if [[ "${goos}" == "windows" ]]; then
              (cd stage && zip -qr "../release-assets/cyp-agent-${VERSION}-${target}.zip" "cyp-agent-${VERSION}-${target}")
            else
              tar -C stage -czf "release-assets/cyp-agent-${VERSION}-${target}.tar.gz" "cyp-agent-${VERSION}-${target}"
            fi
          done
      - name: Build web archive
        shell: bash
        working-directory: apps/web
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          npm ci
          npm audit --audit-level=high
          npm run test
          npm run build
          tar -czf "../../release-assets/cyp-agent-web-${VERSION}.tar.gz" dist
      - name: Checksums
        working-directory: release-assets
        run: sha256sum ./* > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: cyp-agent ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
