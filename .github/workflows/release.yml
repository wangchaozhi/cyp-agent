name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag and package versions
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ inputs.tag }}"
          fi
          tag_name="${tag_name#refs/tags/}"

          if [[ ! "${tag_name}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0 or 0.1.0, got '${tag_name}'." >&2
            exit 1
          fi

          version="${tag_name#v}"
          export VERSION="${version}"

          python - <<'PY'
          import json
          import os
          import pathlib
          import sys
          import tomllib

          expected = os.environ["VERSION"]
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          python_version = pyproject["project"]["version"]
          web_version = json.loads(
              pathlib.Path("apps/web/package.json").read_text(encoding="utf-8")
          )["version"]

          errors = []
          if python_version != expected:
              errors.append(f"pyproject.toml version {python_version} != tag {expected}")
          if web_version != expected:
              errors.append(f"apps/web/package.json version {web_version} != tag {expected}")

          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          PY

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build-python:
    name: Build Python package
    needs: validate-tag
    runs-on: ubuntu-latest
    outputs:
      built: ${{ steps.status.outputs.built }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python asset
        id: build_asset
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"
          python -m pytest
          python -m build

          mkdir -p release-assets
          cp dist/* release-assets/

      - name: Record Python asset status
        id: status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.build_asset.outcome }}" == "success" ]]; then
            echo "built=true" >> "${GITHUB_OUTPUT}"
            echo "Python package asset built successfully." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "built=false" >> "${GITHUB_OUTPUT}"
            echo "Python package asset failed; release will continue if another asset succeeds." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload Python release asset
        if: steps.status.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-python
          path: release-assets/*
          if-no-files-found: error

  build-web:
    name: Build web bundle
    needs: validate-tag
    runs-on: ubuntu-latest
    outputs:
      built: ${{ steps.status.outputs.built }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build web asset
        id: build_asset
        continue-on-error: true
        shell: bash
        working-directory: apps/web
        run: |
          set -euo pipefail

          npm ci
          npm run build

          mkdir -p ../../release-assets
          tar -czf "../../release-assets/cyp-agent-web-${{ needs.validate-tag.outputs.version }}.tar.gz" dist

      - name: Record web asset status
        id: status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.build_asset.outcome }}" == "success" ]]; then
            echo "built=true" >> "${GITHUB_OUTPUT}"
            echo "Web bundle asset built successfully." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "built=false" >> "${GITHUB_OUTPUT}"
            echo "Web bundle asset failed; release will continue if another asset succeeds." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload web release asset
        if: steps.status.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-tag
      - build-python
      - build-web
    if: always() && needs.validate-tag.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check release assets
        id: assets
        shell: bash
        run: |
          if [[ "${{ needs.build-python.outputs.built }}" == "true" || "${{ needs.build-web.outputs.built }}" == "true" ]]; then
            echo "any=true" >> "${GITHUB_OUTPUT}"
          else
            echo "No release assets were built successfully." >&2
            exit 1
          fi

      - name: Download release assets
        if: steps.assets.outputs.any == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        if: steps.assets.outputs.any == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag_name }}
          name: cyp-agent ${{ needs.validate-tag.outputs.tag_name }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
