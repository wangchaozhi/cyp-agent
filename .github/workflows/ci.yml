name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go test, vet & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Verify formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files need gofmt:" >&2
            echo "${unformatted}" >&2
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -count=1 ./...
      - name: Build commands
        shell: bash
        run: |
          mkdir -p bin
          version="$(tr -d '\r\n' < VERSION)"
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o bin/cyp-server ./cmd/cyp-server
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o bin/cyp ./cmd/cyp
          ./bin/cyp-server -version
          ./bin/cyp version

  web:
    name: Web typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Audit dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high
      - name: Lint OpenAPI
        run: npx --yes @redocly/cli@2.38.0 lint api/openapi.yaml
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Test
        working-directory: apps/web
        run: npm run test
      - name: Build
        working-directory: apps/web
        run: npm run build

  docker:
    name: Container build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: cyp-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
