# Conda 环境定义：一条命令拉起 Python + 前端工具链 + 项目本体（editable）。
#
#   conda env create -f environment.yml      # 首次创建
#   conda activate cyp-agent
#   conda env update -f environment.yml --prune   # 依赖变更后同步
#
# Python 依赖以 pyproject.toml 为单一来源，这里只固定解释器与前端工具。
name: cyp-agent
channels:
  - conda-forge
dependencies:
  - python=3.12          # 推荐；依赖面很小，3.11/3.13 亦可，改这一行即可
  - pip
  - nodejs=20            # 前端仪表盘（apps/web）；纯后端可删
  - pip:
      - -e .[dev]        # 项目本体 + 开发依赖（pytest/ruff/mypy 等），可选装 .[anthropic]
