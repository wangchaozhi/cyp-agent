        symbol:
          type: string
        bars:
          type: integer
          minimum: 80
          maximum: 5000
          default: 300
        window:
          type: integer
          minimum: 20
          maximum: 1000
          default: 60
          description: 还必须严格小于 bars。
        seed:
          type: integer
          minimum: 0
          maximum: 1000000
          default: 7
        drift:
          type: number
          minimum: -0.05
          maximum: 0.05
          default: 0.001
        vol:
          type: number
          exclusiveMinimum: 0
          maximum: 0.2
          default: 0.01
        data:
          type: string
          enum: [synthetic, cex]
          default: synthetic
        timeframe:
          type: string
          default: 1h
        fee_rate:
          type: number
          minimum: 0
          maximum: 0.01
          default: 0.0004
        slippage_bps:
          type: number
          minimum: 0
          maximum: 1000
          default: 5
        spread_bps:
          type: number
          minimum: 0
          maximum: 1000
          default: 2
        funding_rate:
          type: number
          minimum: -0.01
          maximum: 0.01
          default: 0

