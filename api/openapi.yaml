openapi: 3.1.0
info:
  title: cyp-agent HTTP API
  version: 1.2.0
  description: |
    React 仪表盘使用的 REST 与 SSE 契约。

    真实 CEX 下单和 `live` 模式均为 hard-disabled。执行仅允许本地 Paper，或在
    `mode=paper`、`execution_venue=okx`、Demo 标识和完整 Demo 凭据同时满足时使用
    OKX 模拟环境；OKX Demo 当前只开放 USDT 线性永续合约。

    交易金额、价格、数量、PnL、费率和风险阈值在响应 JSON 中使用十进制字符串，
    避免经过二进制浮点。回测研究指标和运行计数仍使用 JSON number。集合与嵌套
    对象不返回 null；可选对象在不存在时省略。

    所有写请求必须使用 `application/json`。服务监听非回环地址时必须配置
    `CYP_API_TOKEN`，并通过 Bearer token（或 `X-CYP-API-Token`）认证。
servers:
  - url: /
    description: 与仪表盘同源
tags:
  - name: System
  - name: Settings
  - name: Trading
  - name: Portfolio
  - name: Research
  - name: Events
security: []
paths:
  /api/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: 获取进程与运行模式状态
      responses:
        "200":
          description: 健康快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/ready:
    get:
      tags: [System]
      operationId: getReadiness
      summary: 获取执行就绪、启动对账和安全冻结状态
      responses:
        "200":
          description: 就绪状态；进程存活但被安全门冻结时 HTTP 仍为 200，`ready=false`。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/venues:
    get:
      tags: [System]
      operationId: listVenues
      summary: 获取场所能力与配置状态
      responses:
        "200":
          description: 场所列表；没有场所时返回空数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VenueInfo"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/settings:
    get:
      tags: [Settings]
      operationId: getRuntimeSettings
      summary: 获取脱敏运行配置
      description: 原始 API key、secret、passphrase 永远不得出现在响应中。
      responses:
        "200":
          description: 脱敏配置快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Settings]
      security:
        - WriteToken: []
      operationId: updateRuntimeSettings
      summary: 更新当前进程的运行配置
      description: 可更新分析币种、模型与自动化策略；空密钥表示保持现值，Base URL 只能通过 `CYP_LLM_BASE_URL` 在启动时设置。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettingsUpdate"
      responses:
        "200":
          description: 更新后的脱敏配置快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/market:
    get:
      tags: [Portfolio]
      operationId: getMarket
      summary: 获取跨场所行情摘要
      description: 可读取 Binance/OKX 公共行情，但不会发出真实订单；无可用行情时返回空 maps/array 的 200 响应。
      parameters:
        - name: symbol
          in: query
          required: false
          description: 省略时使用 watchlist 首个标的。
          schema:
            type: string
          example: BTC/USDT
      responses:
        "200":
          description: 行情摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSnapshotInfo"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/market/history:
    get:
      tags: [Portfolio]
      operationId: getMarketHistory
      summary: 获取多个币种的历史收盘价曲线
      description: 每个 symbol 独立读取公共 CEX K 线；单个上游失败时该序列返回空 points，不影响其他币种。
      parameters:
        - name: symbol
          in: query
          required: false
          description: 可重复传入，最多 6 个；省略时使用 watchlist。
          schema:
            type: array
            maxItems: 6
            items: { type: string }
          style: form
          explode: true
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [15m, 1h, 4h, 1d]
            default: 1h
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 12
            maximum: 200
            default: 48
      responses:
        "200":
          description: 多币种历史行情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketHistoryResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/positions:
    get:
      tags: [Portfolio]
      operationId: listPositions
      summary: 获取当前执行场所持仓
      responses:
        "200":
          description: 持仓列表；无持仓时返回空数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/positions/close:
    post:
      tags: [Trading]
      security:
        - WriteToken: []
      operationId: closePosition
      summary: 按当前执行场所价格平仓
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClosePositionRequest"
      responses:
        "200":
          description: 平仓执行结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResult"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/trades:
    get:
      tags: [Portfolio]
      operationId: listTrades
      summary: 获取持久化成交账本
      responses:
        "200":
          description: 按发生时间排列的开平仓记录；无记录时返回空数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeRecord"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/metrics:
    get:
      tags: [System]
      operationId: getMetrics
      summary: 获取运行与 LLM 指标快照
      responses:
        "200":
          description: 指标快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSnapshot"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/risk:
    get:
      tags: [Portfolio]
      operationId: getRisk
      summary: 获取风控看板快照
      responses:
        "200":
          description: 风控快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSnapshot"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/pending:
    get:
      tags: [Trading]
      operationId: listPendingApprovals
      summary: 获取待人工审批项
      responses:
        "200":
          description: 待审批列表；没有待审批时返回空数组
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingApproval"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/portfolio:
    get:
      tags: [Portfolio]
      operationId: getPortfolio
      summary: 获取组合敞口快照
      responses:
        "200":
          description: 组合敞口
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSnapshot"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/backtest:
    post:
      tags: [Research]
      security:
        - WriteToken: []
      operationId: runBacktest
      summary: 运行回测
      description: 支持确定性合成数据；配置只读历史场所时也可使用 `data=cex`。回测永不下单。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: 回测报告
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestReport"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/run:
    post:
      tags: [Trading]
      security:
        - WriteToken: []
      operationId: startRun
      summary: 异步触发一轮分析、风控与模拟执行闭环
      description: 立即返回 run_id；工作流通过 SSE 和轮询继续观察。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
            examples:
              defaultSymbol:
                value: {}
              explicitSymbol:
                value:
                  symbol: BTC/USDT
      responses:
        "200":
          description: 已接受并创建后台任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAccepted"
        "409":
          description: Kill Switch、未配置的执行模式或运行状态禁止触发
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/runs/{run_id}:
    get:
      tags: [Trading]
      operationId: getRun
      summary: 查询一轮闭环的当前或最终结果
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Run 结果；尚未到达的阶段字段为 null。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResult"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/approvals/{run_id}:
    post:
      tags: [Trading]
      security:
        - WriteToken: []
      operationId: decideApproval
      summary: 批准、拒绝或修改待审批规模
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "200":
          description: 审批已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/killswitch:
    get:
      tags: [Trading]
      operationId: getKillSwitch
      summary: 获取 Kill Switch 状态
      responses:
        "200":
          description: Kill Switch 状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Trading]
      security:
        - WriteToken: []
      operationId: setKillSwitch
      summary: 切换 Kill Switch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KillRequest"
      responses:
        "200":
          description: 更新后的 Kill Switch 状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillStatus"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/events:
    get:
      tags: [Events]
      operationId: streamDashboardEvents
      summary: 订阅实时 DashboardEvent
      description: |
        返回默认 SSE `message` 事件。每个业务帧为
        `data: <dashboard-event-json>\n\n`，不得改为命名 `event:`，因为现有前端只监听
        `EventSource.onmessage`。建议首帧发送 `retry: 3000`，空闲约 15 秒发送注释 keepalive。

        data JSON 必须符合 `api/jsonschema/dashboard-event.schema.json`。
      responses:
        "200":
          description: 持续的 SSE 字节流
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-cache
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                runStarted:
                  value: |
                    retry: 3000

                    data: {"type":"run_started","run_id":"abc123","ts":"2026-07-10T10:00:00Z","symbol":"BTC/USDT"}

        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    WriteToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: "`CYP_API_TOKEN`。回环监听且未配置 token 时，服务允许本机写请求。"

  responses:
    ErrorResponse:
      description: 请求失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [detail]
      properties:
        detail:
          type: string
        code:
          type: string

    DecimalString:
      type: string
      description: 有限十进制；允许普通或指数记法，输出不使用 NaN/Infinity。
      pattern: "^[+-]?(?:[0-9]+(?:\\.[0-9]*)?|\\.[0-9]+)(?:[eE][+-]?[0-9]+)?$"
      examples: ["1000.00"]

    DecimalInput:
      description: 请求兼容旧前端的 JSON number；服务内部必须直接解析为十进制，禁止先转 float64。
      oneOf:
        - $ref: "#/components/schemas/DecimalString"
        - type: number

    NullableDecimalString:
      oneOf:
        - $ref: "#/components/schemas/DecimalString"
        - type: "null"

    HealthStatus:
      type: object
      additionalProperties: false
      required: [ok, mode, llm, kill]
      properties:
        ok:
          type: boolean
        mode:
          type: string
        display_mode:
          type: string
        execution_venue:
          type: string
        llm:
          type: boolean
        kill:
          type: boolean

    ReadinessStatus:
      type: object
      additionalProperties: false
      required: [ok, ready, execution_ready, reconciling, safety, reasons]
      properties:
        ok: { type: boolean }
        ready: { type: boolean }
        execution_ready: { type: boolean }
        reconciling: { type: boolean }
        safety:
          type: object
          additionalProperties: true
        reasons:
          type: array
          items: { type: string }

    VenueInfo:
      type: object
      additionalProperties: false
      required: [id, kind, configured, spot, perp, native_protective_orders, read_only]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [paper, cex, onchain]
        configured:
          type: boolean
        spot:
          type: boolean
        perp:
          type: boolean
        native_protective_orders:
          type: boolean
        read_only:
          type: boolean

    LiveGuard:
      type: object
      additionalProperties: false
      required: [ok, reasons]
      properties:
        ok:
          type: boolean
        reasons:
          type: array
          items:
            type: string

    RuntimeSettings:
      type: object
      additionalProperties: false
      required:
        - mode
        - approval
        - kill
        - allow_perp
        - execution_venue
        - data_source
        - llm_enabled
        - llm_provider
        - llm_model
        - llm_model_fast
        - llm_base_url
        - api_auth_enabled
        - cex_id
        - cex_trading_configured
        - okx
        - watchlist
        - intervals
        - runtime
        - risk
        - budget
        - automation
        - live_guard
      properties:
        mode:
          type: string
        approval:
          type: string
        kill:
          type: boolean
        allow_perp:
          type: boolean
        execution_venue:
          type: string
        data_source:
          type: string
        llm_enabled:
          type: boolean
        llm_provider:
          type: string
        llm_model:
          type: string
        llm_model_fast:
          type: string
        llm_base_url:
          type: [string, "null"]
        api_auth_enabled:
          type: boolean
        cex_id:
          type: string
        cex_trading_configured:
          type: boolean
        okx:
          type: object
          additionalProperties: false
          required: [configured, demo]
          properties:
            configured:
              type: boolean
            demo:
              type: boolean
        watchlist:
          type: array
          items:
            type: string
        intervals:
          type: object
          additionalProperties: false
          required: [scan, monitor]
          properties:
            scan:
              type: number
              minimum: 0
            monitor:
              type: number
              minimum: 0
        runtime:
          type: object
          additionalProperties: false
          required: [max_concurrency, log_level, autostart, persistence]
          properties:
            max_concurrency:
              type: integer
              minimum: 1
            log_level:
              type: string
            autostart:
              type: boolean
            persistence:
              type: string
              enum: [memory, file, postgres]
        risk:
          $ref: "#/components/schemas/RiskLimitsSettings"
        budget:
          type: object
          additionalProperties: false
          required: [max_iterations, max_tokens, max_cost_usd, max_wall_seconds]
          properties:
            max_iterations:
              type: integer
              minimum: 0
            max_tokens:
              type: integer
              minimum: 0
            max_cost_usd:
              type: number
              minimum: 0
            max_wall_seconds:
              type: number
              minimum: 0
        automation:
          $ref: "#/components/schemas/AutomationSettings"
        live_guard:
          $ref: "#/components/schemas/LiveGuard"

    RiskLimitsSettings:
      type: object
      additionalProperties: false
      required:
        - max_risk_per_trade
        - max_position_pct
        - max_gross_exposure
        - max_symbol_concentration
        - max_correlated_exposure
        - max_cvar_pct
        - max_orders_per_hour
        - max_slippage_bps
        - max_leverage
        - min_liq_buffer
        - force_isolated
        - min_margin_ratio
        - daily_drawdown_limit
        - weekly_drawdown_limit
        - max_drawdown_limit
        - max_consecutive_losses
        - approval_timeout_seconds
      properties:
        max_risk_per_trade: { $ref: "#/components/schemas/DecimalString" }
        max_position_pct: { $ref: "#/components/schemas/DecimalString" }
        max_gross_exposure: { $ref: "#/components/schemas/DecimalString" }
        max_symbol_concentration: { $ref: "#/components/schemas/DecimalString" }
        max_correlated_exposure: { $ref: "#/components/schemas/DecimalString" }
        max_cvar_pct: { $ref: "#/components/schemas/DecimalString" }
        max_orders_per_hour:
          type: integer
          minimum: 0
        max_slippage_bps: { $ref: "#/components/schemas/DecimalString" }
        max_leverage: { $ref: "#/components/schemas/DecimalString" }
        min_liq_buffer: { $ref: "#/components/schemas/DecimalString" }
        force_isolated:
          type: boolean
        min_margin_ratio: { $ref: "#/components/schemas/DecimalString" }
        daily_drawdown_limit: { $ref: "#/components/schemas/DecimalString" }
        weekly_drawdown_limit: { $ref: "#/components/schemas/DecimalString" }
        max_drawdown_limit: { $ref: "#/components/schemas/DecimalString" }
        max_consecutive_losses:
          type: integer
          minimum: 0
        approval_timeout_seconds:
          type: number
          minimum: 0

    RuntimeSettingsUpdate:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [paper, live]
          description: 运行时模式；paper 可使用本地 Paper 或 OKX Demo，live 仅开放只读分析并硬禁真实执行。
        watchlist:
          type: array
          minItems: 1
          maxItems: 12
          uniqueItems: true
          description: 顶部“分析币种”下拉使用的币种池；OKX Demo 仅接受 BTC/USDT:USDT 这类 USDT 永续格式。
          items:
            type: string
            pattern: '^[A-Za-z0-9]{2,20}/[A-Za-z0-9]{2,12}(:[A-Za-z0-9]{2,12})?$'
        llm_provider:
          type: string
          enum: [anthropic, deepseek]
        llm_model:
          type: string
        llm_model_fast:
          type: string
        llm_base_url:
          type: string
          description: 仅允许回传当前值；修改地址必须重启服务。
        anthropic_api_key:
          type: string
          writeOnly: true
        deepseek_api_key:
          type: string
          writeOnly: true
        automation:
          $ref: "#/components/schemas/AutomationSettingsUpdate"

    AutomationSettings:
      type: object
      additionalProperties: false
      required: [enabled, scan_enabled, entry_enabled, approval_enabled, exit_enabled, reverse_enabled, max_risk_score, max_quote, min_entry_quote, min_confidence, min_reward_risk, kelly_scale, reverse_min_confidence, reverse_min_reward_risk, reverse_confirmations, reverse_signal_minutes, reverse_cooldown_minutes, max_reversals_per_day, ewma_lambda, volatility_multiplier, trail_activation_r, trail_giveback_r, max_holding_minutes, time_stop_min_r, exit_confirmations, exit_min_samples]
      properties:
        enabled: { type: boolean }
        scan_enabled: { type: boolean }
        entry_enabled: { type: boolean }
        approval_enabled: { type: boolean }
        exit_enabled: { type: boolean }
        reverse_enabled: { type: boolean }
        max_risk_score: { type: number, minimum: 0, maximum: 1 }
        max_quote: { $ref: "#/components/schemas/DecimalString" }
        min_entry_quote: { $ref: "#/components/schemas/DecimalString" }
        min_confidence: { type: number, minimum: 0, maximum: 1 }
        min_reward_risk: { type: number, exclusiveMinimum: 0 }
        kelly_scale: { type: number, exclusiveMinimum: 0, maximum: 1 }
        reverse_min_confidence: { type: number, minimum: 0, maximum: 1 }
        reverse_min_reward_risk: { type: number, exclusiveMinimum: 0 }
        reverse_confirmations: { type: integer, minimum: 1 }
