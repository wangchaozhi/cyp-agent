            required: [name, value, note]
            properties:
              name: { type: string }
              value: { type: string }
              note: { type: string }
        rationale: { type: string }
        degraded: { type: boolean }

    ApprovalDecision:
      type: object
      additionalProperties: false
      required: [decision, modified, operator, ts, note]
      properties:
        decision:
          type: string
          enum: [approve, reject, modify]
        modified:
          oneOf:
            - $ref: "#/components/schemas/TradeProposal"
