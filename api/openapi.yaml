            max_leverage: { $ref: "#/components/schemas/DecimalString" }
            max_margin_pct: { $ref: "#/components/schemas/DecimalString" }
            leverage_step: { $ref: "#/components/schemas/DecimalString" }
            min_liq_buffer: { $ref: "#/components/schemas/DecimalString" }
            max_orders_per_hour:
              type: integer
              minimum: 0
            max_consecutive_losses:
              type: integer
              minimum: 0
            min_margin_ratio: { $ref: "#/components/schemas/DecimalString" }
        live_guard:
          $ref: "#/components/schemas/LiveGuard"

    SymbolExposure:
      type: object
      additionalProperties: false
      required: [symbol, cluster, long, short]
      properties:
        symbol:
          type: string
        cluster:
          type: string
          enum: [major, alt]
        long: { $ref: "#/components/schemas/DecimalString" }
        short: { $ref: "#/components/schemas/DecimalString" }

    PortfolioSnapshot:
      type: object
      additionalProperties: false
      required: [equity, n_positions, gross, clusters, by_symbol, correlated_limit]
      properties:
        equity: { $ref: "#/components/schemas/DecimalString" }
        n_positions:
          type: integer
          minimum: 0
        gross: { $ref: "#/components/schemas/DecimalString" }
        clusters:
          type: object
          additionalProperties: false
          required: [major, alt]
          properties:
            major:
              $ref: "#/components/schemas/DirectionalExposure"
            alt:
              $ref: "#/components/schemas/DirectionalExposure"
        by_symbol:
          type: array
          items:
            $ref: "#/components/schemas/SymbolExposure"
        correlated_limit: { $ref: "#/components/schemas/DecimalString" }

    DirectionalExposure:
      type: object
      additionalProperties: false
      required: [long, short]
      properties:
        long: { $ref: "#/components/schemas/DecimalString" }
        short: { $ref: "#/components/schemas/DecimalString" }

    VenuePrice:
      type: object
      additionalProperties: false
      required: [venue, price]
      properties:
        venue:
          type: [string, "null"]
        price:
          $ref: "#/components/schemas/NullableDecimalString"

    MarketSnapshotInfo:
      type: object
      additionalProperties: false
      required: [symbol, tickers, best_buy, best_sell, spread_bps, funding_rates, arb_hints]
      properties:
        symbol:
          type: string
        tickers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DecimalString"
        best_buy:
          $ref: "#/components/schemas/VenuePrice"
        best_sell:
          $ref: "#/components/schemas/VenuePrice"
        spread_bps:
          $ref: "#/components/schemas/NullableDecimalString"
        funding_rates:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DecimalString"
        arb_hints:
          type: array
          items:
            type: string

    MarketHistoryPoint:
      type: object
      additionalProperties: false
      required: [ts, close]
      properties:
        ts:
          type: string
          format: date-time
        close:
          $ref: "#/components/schemas/DecimalString"

    MarketHistorySeries:
      type: object
      additionalProperties: false
      required: [symbol, points]
      properties:
        symbol:
          type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/MarketHistoryPoint"

    MarketHistoryResponse:
      type: object
      additionalProperties: false
      required: [venue, timeframe, series]
      properties:
        venue:
          type: string
        timeframe:
          type: string
        series:
          type: array
          items:
            $ref: "#/components/schemas/MarketHistorySeries"

    MetricsSnapshot:
      type: object
      additionalProperties: false
      required: [runs, llm, runtime]
      properties:
        runs:
          type: object
          additionalProperties: false
          required:
            - runs
            - executed
            - rejected
            - not_approved
            - no_trade
            - errors
            - avg_slippage_bps
            - approval_rate
            - order_success_rate
            - slippage_hist_bps
            - approval_latency
          properties:
            runs: { type: integer, minimum: 0 }
            executed: { type: integer, minimum: 0 }
            rejected: { type: integer, minimum: 0 }
            not_approved: { type: integer, minimum: 0 }
            no_trade: { type: integer, minimum: 0 }
            errors: { type: integer, minimum: 0 }
            avg_slippage_bps: { type: number }
            approval_rate: { type: number, minimum: 0, maximum: 1 }
            order_success_rate: { type: number, minimum: 0, maximum: 1 }
            slippage_hist_bps:
              type: object
              additionalProperties:
                type: integer
                minimum: 0
            approval_latency:
              type: object
              additionalProperties: false
              required: [avg_s, max_s, n]
              properties:
                avg_s: { type: number, minimum: 0 }
                max_s: { type: number, minimum: 0 }
                n: { type: integer, minimum: 0 }
        llm:
          type: object
          additionalProperties: true
        runtime:
          type: object
          additionalProperties: false
          required: [scan_cycles, scan_errors, monitor_cycles, monitor_errors, reconcile_attempts, reconcile_failures, alerts, ohlcv_queued, ohlcv_saved, ohlcv_dropped, ohlcv_errors, ohlcv_pruned, ohlcv_repair_runs, ohlcv_backfilled, token_usage_queued, token_usage_saved, token_usage_dropped, token_usage_errors]
          properties:
            scan_cycles: { type: integer, minimum: 0 }
            scan_errors: { type: integer, minimum: 0 }
            monitor_cycles: { type: integer, minimum: 0 }
            monitor_errors: { type: integer, minimum: 0 }
            reconcile_attempts: { type: integer, minimum: 0 }
            reconcile_failures: { type: integer, minimum: 0 }
            alerts: { type: integer, minimum: 0 }
            ohlcv_queued: { type: integer, minimum: 0 }
            ohlcv_saved: { type: integer, minimum: 0 }
            ohlcv_dropped: { type: integer, minimum: 0 }
            ohlcv_errors: { type: integer, minimum: 0 }
            ohlcv_pruned: { type: integer, minimum: 0 }
            ohlcv_repair_runs: { type: integer, minimum: 0 }
            ohlcv_backfilled: { type: integer, minimum: 0 }
            token_usage_queued: { type: integer, minimum: 0 }
            token_usage_saved: { type: integer, minimum: 0 }
            token_usage_dropped: { type: integer, minimum: 0 }
            token_usage_errors: { type: integer, minimum: 0 }
        token_usage:
          $ref: "#/components/schemas/TokenUsageSummary"

    TokenUsageSummary:
      type: object
      additionalProperties: false
      required: [day, timezone, calls, successes, errors, budget_rejections, input_tokens, output_tokens, total_tokens, cost_usd, success_rate, token_budget, cost_budget_usd, token_ratio, cost_ratio, utilization, level, paused]
      properties:
        day: { type: string, format: date }
        timezone: { type: string }
        calls: { type: integer, minimum: 0 }
        successes: { type: integer, minimum: 0 }
        errors: { type: integer, minimum: 0 }
        budget_rejections: { type: integer, minimum: 0 }
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
        cost_usd: { type: number, minimum: 0 }
        success_rate: { type: number, minimum: 0, maximum: 1 }
        token_budget: { type: integer, minimum: 1 }
        cost_budget_usd: { type: number, exclusiveMinimum: 0 }
        token_ratio: { type: number, minimum: 0 }
        cost_ratio: { type: number, minimum: 0 }
        utilization: { type: number, minimum: 0 }
        level: { type: string, enum: [normal, warning, critical, paused] }
        paused: { type: boolean }

    TokenUsageDimension:
      type: object
      additionalProperties: false
      required: [key, calls, successes, input_tokens, output_tokens, total_tokens, cost_usd]
      properties:
        key: { type: string }
        calls: { type: integer, minimum: 0 }
        successes: { type: integer, minimum: 0 }
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
        cost_usd: { type: number, minimum: 0 }

    TokenUsageTrend:
      type: object
      additionalProperties: false
      required: [start, calls, successes, input_tokens, output_tokens, total_tokens, cost_usd]
      properties:
        start: { type: string, format: date-time }
        calls: { type: integer, minimum: 0 }
        successes: { type: integer, minimum: 0 }
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
        cost_usd: { type: number, minimum: 0 }

    TokenUsageEvent:
      type: object
      additionalProperties: false
      required: [id, ts, provider, model, operation, status, input_tokens, output_tokens, cost_usd, duration_ms, token_estimated, cost_estimated]
      properties:
        id: { type: string }
        ts: { type: string, format: date-time }
        run_id: { type: string }
        symbol: { type: string }
        agent: { type: string }
        source: { type: string }
        provider: { type: string }
        model: { type: string }
        operation: { type: string, enum: [text, json] }
        status: { type: string, enum: [success, error, budget_rejected] }
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        cost_usd: { type: number, minimum: 0 }
        duration_ms: { type: integer, minimum: 0 }
        token_estimated: { type: boolean }
        cost_estimated: { type: boolean }
        error_kind: { type: string }

    TokenUsageReport:
      type: object
      additionalProperties: false
      required: [generated_at, days, bucket, today, trend, by_provider, by_model, by_agent, by_symbol, by_source, recent]
      properties:
        generated_at: { type: string, format: date-time }
        days: { type: integer, minimum: 1 }
        bucket: { type: string, enum: [hour, day] }
        today: { $ref: "#/components/schemas/TokenUsageSummary" }
        trend:
          type: array
          items: { $ref: "#/components/schemas/TokenUsageTrend" }
        by_provider: { type: array, items: { $ref: "#/components/schemas/TokenUsageDimension" } }
        by_model: { type: array, items: { $ref: "#/components/schemas/TokenUsageDimension" } }
        by_agent: { type: array, items: { $ref: "#/components/schemas/TokenUsageDimension" } }
        by_symbol: { type: array, items: { $ref: "#/components/schemas/TokenUsageDimension" } }
        by_source: { type: array, items: { $ref: "#/components/schemas/TokenUsageDimension" } }
        recent: { type: array, items: { $ref: "#/components/schemas/TokenUsageEvent" } }

    BacktestRequest:
      type: object
      additionalProperties: false
      required: [bars, window, seed, drift, vol, data, timeframe, fee_rate, slippage_bps, spread_bps, funding_rate]
      properties:
        symbol:
          type: string
        bars:
          type: integer
          minimum: 80
          maximum: 5000
          default: 300
        window:
          type: integer
          minimum: 20
          maximum: 1000
          default: 60
          description: 还必须严格小于 bars。
        seed:
          type: integer
          minimum: 0
          maximum: 1000000
          default: 7
        drift:
          type: number
          minimum: -0.05
          maximum: 0.05
          default: 0.001
        vol:
          type: number
          exclusiveMinimum: 0
          maximum: 0.2
          default: 0.01
        data:
          type: string
          enum: [synthetic, cex]
          default: synthetic
        timeframe:
          type: string
          default: 1h
        fee_rate:
          type: number
          minimum: 0
          maximum: 0.01
          default: 0.0004
        slippage_bps:
          type: number
          minimum: 0
          maximum: 1000
          default: 5
        spread_bps:
          type: number
          minimum: 0
          maximum: 1000
          default: 2
        funding_rate:
          type: number
          minimum: -0.01
          maximum: 0.01
          default: 0

    BacktestMetrics:
      type: object
      additionalProperties: false
      required:
        - initial_equity
        - final_equity
        - total_return
        - max_drawdown
        - sharpe
        - n_trades
        - win_rate
        - profit_factor
        - total_costs
      properties:
        initial_equity: { type: number }
        final_equity: { type: number }
        total_return: { type: number }
        max_drawdown: { type: number }
        sharpe: { type: number }
        n_trades: { type: integer, minimum: 0 }
        win_rate: { type: number, minimum: 0, maximum: 1 }
        profit_factor:
          type: [number, "null"]
        total_costs: { type: number }

    BacktestTrade:
      type: object
      additionalProperties: false
      required: [side, entry, exit, pnl, bar_in, bar_out, costs]
      properties:
        side:
          type: string
          enum: [long, short]
        entry: { type: number }
        exit: { type: number }
        pnl: { type: number }
        bar_in: { type: integer, minimum: 0 }
        bar_out: { type: integer, minimum: 0 }
        costs: { type: number }

    BacktestParams:
      allOf:
        - $ref: "#/components/schemas/BacktestRequest"
        - type: object
          required: [symbol]

    BacktestReport:
      type: object
      additionalProperties: false
      required: [symbol, n_bars, metrics, trades, equity_curve, lessons, params]
      properties:
        symbol:
          type: string
        n_bars:
          type: integer
          minimum: 0
        metrics:
          $ref: "#/components/schemas/BacktestMetrics"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/BacktestTrade"
        equity_curve:
          type: array
          items:
            type: number
        lessons:
          type: array
          items:
            type: string
        params:
          $ref: "#/components/schemas/BacktestParams"

    RunRequest:
      type: object
      additionalProperties: false
      properties:
        symbol:
          type: string

    RunAccepted:
      type: object
      additionalProperties: false
      required: [run_id, symbol]
      properties:
        run_id:
          type: string
        symbol:
          type: string

    ApprovalRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [decision]
          properties:
            decision:
              const: approve
            note:
              type: string
            operator:
              type: string
        - type: object
          additionalProperties: false
          required: [decision]
          properties:
            decision:
              const: reject
            note:
              type: string
            operator:
              type: string
        - type: object
          additionalProperties: false
          required: [decision, size]
          properties:
            decision:
              const: modify
            size:
              $ref: "#/components/schemas/DecimalInput"
            note:
              type: string
            operator:
              type: string

    ClosePositionRequest:
      type: object
      additionalProperties: false
      required: [symbol, instrument]
      properties:
        symbol:
          type: string
        instrument:
          type: string
          enum: [spot, perp]

    KillRequest:
      type: object
      additionalProperties: false
      required: ["on"]
      properties:
        "on":
          type: boolean

    KillStatus:
      type: object
      additionalProperties: false
      required: [kill]
      properties:
        kill:
          type: boolean

    OKResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean

    DashboardEvent:
      $ref: "./jsonschema/dashboard-event.schema.json"
